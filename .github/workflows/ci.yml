name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  build_static_artifact:
    name: Build static artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp style.css _site/
          cp app.js _site/
          cp logic.js _site/
          cp exalt_logo.png _site/

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: _site

  sonar:
    name: Sonar scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check Sonar secrets
        id: sonar_check
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -n "$SONAR_TOKEN" && -n "$SONAR_HOST_URL" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar scan skipped: SONAR_TOKEN or SONAR_HOST_URL is missing"
          fi

      - name: Checkout
        if: steps.sonar_check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.sonar_check.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.sonar_check.outputs.enabled == 'true'
        run: npm ci

      - name: Run tests with coverage
        if: steps.sonar_check.outputs.enabled == 'true'
        run: npm run test

      - name: SonarCloud Scan
        if: steps.sonar_check.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
